<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Microstock</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Selamat Datang</h1>
    <p>Pilih menu untuk melihat aturan:</p>

    <button class="rule-btn" onclick="showModal('riset')">🔍 Riset Tren</button>
    <button class="rule-btn" onclick="showModal('gambar')">🎨 Buat Gambar</button>

    <input type="text" id="userInput" placeholder="Ketik perintah di sini...">
    <button class="submit-btn" onclick="kirimKeN8N()">Kirim</button>

    <div id="cardContainer" style="margin-top: 20px; display: flex; flex-direction: column; gap: 12px;">
        <div id="statusAwal" style="padding: 15px; border: 1px solid #ccc; border-radius: 12px; color: #666; text-align: center; background: #fff;">
            Hasil riset akan muncul di sini...
        </div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle"></h3>
            <p id="modalBody"></p>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content" style="margin: 15% auto; max-height: 70vh; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box;">
            <span class="close-btn" onclick="closeDetailModal()">&times;</span>
            <h3 id="detailTitle" style="margin-top: 0; margin-bottom: 15px; text-align: center; font-size: 1.2rem;"></h3>
            <div id="detailContent" style="overflow-y: auto; flex-grow: 1; padding-right: 5px; white-space: pre-wrap; font-size: 0.95rem; line-height: 1.6; color: #555; text-align: left;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
