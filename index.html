<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Microstock</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Selamat Datang</h1>
    <p>Pilih menu untuk melihat aturan:</p>

    <button class="rule-btn" onclick="showModal('riset')">🔍 Riset Tren</button>
    <button class="rule-btn" onclick="showModal('gambar')">🎨 Buat Gambar</button>

    <input type="text" id="userInput" placeholder="Ketik perintah di sini...">
    <button class="submit-btn" onclick="kirimKeN8N()">Kirim</button>

    <div id="hasilArea" style="margin-top: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px;">
    Hasil riset akan muncul di sini...
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h3 id="modalTitle"></h3>
            <p id="modalBody"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
